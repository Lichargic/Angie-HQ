name: Report Data Issues
description: Report SkyBlock item data, NPC price, Bazaar behavior, or calculation inputs that look wrong.
title: "[Data]: "
labels: ["data", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when an item, NPC price, Bazaar-related value, or calculation input looks wrong.
  - type: dropdown
    id: tool
    attributes:
      label: Where did you see it?
      options:
        - NPC to Bazaar
        - Other or not sure
    validations:
      required: true
  - type: input
    id: item
    attributes:
      label: Item name
      description: Name the item exactly as it appears in Angie, if possible.
      placeholder: Packed Ice
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What looks wrong?
      description: Describe the incorrect value, missing item, calculation issue, or confusing data.
      placeholder: The NPC price looks wrong because...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should it be?
      description: Add the value or behavior you expected, plus any source or screenshot that helps verify it.
    validations:
      required: false
  - type: checkboxes
    id: public-report
    attributes:
      label: Public report check
      options:
        - label: This does not include private vulnerability details, credentials, or API keys.
          required: true
