name: Report Data Issues
description: Report SkyBlock item data, NPC price, Bazaar behavior, or calculation inputs that look wrong.
title: "[Data]: "
labels: ["data", "triage"]
assignees: [Lichargic]
body:
  - type: markdown
    attributes:
      value: |
        Use this when an item, NPC price, Bazaar-related value, or calculation input looks wrong. Angie is a solo project, so responses may take a few days.

        Do not include security vulnerabilities or sensitive abuse paths here. See [SECURITY.md](https://github.com/Lichargic/Angie-HQ/blob/main/SECURITY.md) instead.
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Before you open this
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
  - type: dropdown
    id: tool
    attributes:
      label: Where did you see it?
      options:
        - NPC to Bazaar
        - Other or not sure
    validations:
      required: true
  - type: input
    id: item
    attributes:
      label: Item name, if relevant
      description: Name the item exactly as it appears in Angie, if the issue is item-specific.
      placeholder: Packed Ice
    validations:
      required: false
  - type: textarea
    id: issue
    attributes:
      label: What looks wrong?
      description: Describe the incorrect value, missing item, calculation issue, or confusing data.
      placeholder: The NPC price looks wrong because...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should it be?
      description: Add the value or behavior you expected, plus any source or screenshot that helps verify it.
    validations:
      required: false
  - type: checkboxes
    id: public-report
    attributes:
      label: Public report check
      options:
        - label: This is not a security vulnerability or sensitive abuse report.
          required: true
